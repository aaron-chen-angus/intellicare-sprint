<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>intelliCARE Sprint – Demo</title>
<style>
  body {
    background: radial-gradient(ellipse at 50% 0%, #1a2e4a 0%, #0a0f1e 100%);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    margin: 0;
    padding: 24px 0;
    box-sizing: border-box;
  }

<div id="race-game-container"></div>

<style>
/* ── Scoped entirely to #race-game-container ────────────────── */
#race-game-container {
  --rg-w: min(400px, 96vw);
  --rg-h: calc(var(--rg-w) * 16 / 9);
  width:  var(--rg-w);
  height: var(--rg-h);
  position: relative;
  overflow: hidden;
  border-radius: 26px;
  box-shadow:
    0 0 0 2px #ffffff14,
    0 0 0 5px #00d4ff18,
    0 40px 100px #00000099;
  font-family: 'Trebuchet MS', 'Arial Black', 'Arial', sans-serif;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
  background: #000;
}
#race-game-container canvas {
  display: block; width: 100%; height: 100%; border-radius: 26px;
}

/* ── Screens ── */
#race-game-container .rg-screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0;
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s cubic-bezier(.4,0,.2,1);
  border-radius: 26px;
}
#race-game-container .rg-screen.on {
  opacity: 1; pointer-events: all;
}

/* ════════════════════════════════
   START SCREEN
════════════════════════════════ */
#race-game-container .rg-start-bg {
  background:
    radial-gradient(ellipse 80% 60% at 50% 110%, #00d4ff22 0%, transparent 70%),
    linear-gradient(170deg, #0b1e3a 0%, #071428 55%, #040d1a 100%);
}

/* Brand header */
#race-game-container .rg-brand {
  display: flex; flex-direction: column; align-items: center;
  margin-bottom: 6px;
}
#race-game-container .rg-brand-name {
  font-size: clamp(0.72em, 2.8vw, 0.92em);
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #00d4ff;
  text-shadow: 0 0 18px #00d4ff88;
  margin-bottom: 2px;
}
#race-game-container .rg-brand-sub {
  font-size: clamp(0.58em, 2vw, 0.72em);
  font-weight: 600;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #4a8faf;
}

/* Divider line */
#race-game-container .rg-divider {
  width: 120px; height: 1px;
  background: linear-gradient(90deg, transparent, #00d4ff88, transparent);
  margin: 10px auto;
}

/* Runner emoji */
#race-game-container .rg-runner-preview {
  font-size: clamp(3.2em, 11vw, 4.2em);
  line-height: 1;
  margin: 8px 0 4px;
  animation: rg-bounce 0.55s infinite alternate ease-in-out;
  filter: drop-shadow(0 0 12px #ff4a3088);
}
@keyframes rg-bounce {
  from { transform: translateY(0) scaleY(1); }
  to   { transform: translateY(-10px) scaleY(1.04); }
}

/* Event title */
#race-game-container .rg-event-label {
  font-size: clamp(0.65em, 2.2vw, 0.8em);
  font-weight: 700;
  letter-spacing: 5px;
  color: #5ba8cc;
  text-transform: uppercase;
  margin-bottom: 2px;
}
#race-game-container .rg-logo-dist {
  font-size: clamp(3em, 10vw, 4em);
  font-weight: 900;
  color: #fff;
  text-shadow: 0 0 40px #00d4ff66, 0 4px 0 #001a33;
  letter-spacing: 3px;
  line-height: 1;
  margin: 0;
}
#race-game-container .rg-logo-event {
  font-size: clamp(0.78em, 2.8vw, 1em);
  font-weight: 800;
  letter-spacing: 8px;
  color: #00d4ff;
  text-transform: uppercase;
  margin-top: 2px;
}

/* Tagline */
#race-game-container .rg-tagline {
  font-size: clamp(0.72em, 2.5vw, 0.86em);
  color: #6a9ab8;
  text-align: center;
  line-height: 1.6;
  margin: 12px 0 18px;
}

/* ── Buttons ── */
#race-game-container .rg-btn {
  background: linear-gradient(135deg, #00d4ff 0%, #0072e5 100%);
  color: #fff;
  font-family: inherit;
  font-size: clamp(0.92em, 3.2vw, 1.1em);
  font-weight: 800;
  padding: 14px 52px;
  border: none; border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 6px 28px #00d4ff44, 0 2px 0 #0044aa inset;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: transform 0.1s, box-shadow 0.1s;
  position: relative;
  overflow: hidden;
}
#race-game-container .rg-btn::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, #ffffff22 0%, transparent 60%);
  border-radius: inherit;
}
#race-game-container .rg-btn:hover  { transform: scale(1.06) translateY(-1px); box-shadow: 0 10px 34px #00d4ff66; }
#race-game-container .rg-btn:active { transform: scale(0.97); }
#race-game-container .rg-btn.gold {
  background: linear-gradient(135deg, #ffe54c 0%, #ff8c00 100%);
  box-shadow: 0 6px 28px #ffd70055, 0 2px 0 #aa6600 inset;
}
#race-game-container .rg-btn.gold::after {
  background: linear-gradient(180deg, #ffffff33 0%, transparent 60%);
}

/* ── Countdown overlay ── */
#race-game-container .rg-cd {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; opacity: 0; transition: opacity 0.12s;
  background: #00000044;
}
#race-game-container .rg-cd.on { opacity: 1; }
#race-game-container .rg-cd-text {
  font-size: clamp(5em, 18vw, 7.5em);
  font-weight: 900;
  color: #fff;
  text-shadow: 0 0 60px #00d4ffcc, 0 6px 0 #002244;
  animation: rg-pop .32s cubic-bezier(.3,1.4,.5,1);
}
#race-game-container .rg-cd-text.go {
  color: #00ff99;
  text-shadow: 0 0 60px #00ff99cc, 0 6px 0 #003322;
  font-size: clamp(4em, 15vw, 6em);
  letter-spacing: 4px;
}
@keyframes rg-pop {
  0%   { transform: scale(2.2) rotate(-4deg); opacity: 0; }
  60%  { transform: scale(0.88) rotate(1deg); }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* ── HUD ── */
#race-game-container .rg-hud {
  position: absolute; top: 10px; left: 10px; right: 10px;
  display: flex; justify-content: space-between; align-items: center;
  pointer-events: none; gap: 6px;
}
#race-game-container .rg-hud-box {
  background: linear-gradient(135deg, #0a1f3aee, #071428ee);
  border: 1px solid #00d4ff33;
  border-radius: 12px;
  padding: 5px 12px;
  color: #fff;
  font-size: clamp(0.65em, 2.2vw, 0.78em);
  font-weight: 700;
  box-shadow: 0 2px 12px #00000055;
}
#race-game-container .rg-hud-label { color: #00d4ff; font-size: 0.72em; display: block; letter-spacing: 1px; }
#race-game-container .rg-hud-val   { font-size: 1.12em; }

/* ── Tap ring ── */
#race-game-container .rg-tap-ring {
  position: absolute;
  width: 74px; height: 74px;
  border-radius: 50%;
  border: 3px solid #ffe54ccc;
  transform: translate(-50%,-50%);
  pointer-events: none;
  animation: rg-ring-pulse 0.7s ease-out forwards;
}
@keyframes rg-ring-pulse {
  0%   { transform: translate(-50%,-50%) scale(0.8); opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(2.0); opacity: 0; }
}

/* ── Tap label ── */
#race-game-container .rg-tap-label {
  position: absolute;
  color: #ffe54c;
  font-weight: 900;
  font-size: clamp(0.85em, 3vw, 1em);
  text-shadow: 0 0 14px #ff8800, 0 1px 0 #000;
  pointer-events: none;
  animation: rg-float-up 0.75s ease forwards;
  white-space: nowrap;
}
@keyframes rg-float-up {
  0%   { opacity: 1; transform: translateY(0) scale(1.3); }
  100% { opacity: 0; transform: translateY(-50px) scale(0.85); }
}

/* ════════════════════════════════
   PODIUM SCREEN
════════════════════════════════ */
#race-game-container .rg-podium-screen {
  background:
    radial-gradient(ellipse 100% 80% at 50% 120%, #ffd70015 0%, transparent 65%),
    radial-gradient(ellipse 60% 40% at 50% -10%, #00d4ff0a 0%, transparent 60%),
    linear-gradient(170deg, #0b1e38 0%, #050e1c 100%);
  gap: 0;
  justify-content: flex-start;
  padding-top: 0;
}

#race-game-container .rg-win-badge {
  display: flex; flex-direction: column; align-items: center;
  margin: 6px 0 4px;
}
#race-game-container .rg-win-trophy {
  font-size: clamp(2.2em, 7vw, 2.8em);
  line-height: 1;
  filter: drop-shadow(0 0 16px #ffd700cc);
  animation: rg-trophy-pulse 1.2s infinite alternate ease-in-out;
}
@keyframes rg-trophy-pulse {
  from { transform: scale(1) rotate(-3deg); filter: drop-shadow(0 0 14px #ffd700aa); }
  to   { transform: scale(1.08) rotate(3deg); filter: drop-shadow(0 0 28px #ffd700ff); }
}
#race-game-container .rg-win-title {
  font-size: clamp(1.5em, 5.5vw, 1.9em);
  font-weight: 900;
  color: #ffe54c;
  text-shadow: 0 0 30px #ffd70099, 0 3px 0 #7a4a00;
  letter-spacing: 3px;
  margin: 2px 0 0;
  text-align: center;
}
#race-game-container .rg-win-subtitle {
  font-size: clamp(0.6em, 2vw, 0.75em);
  color: #5ba8cc;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 3px;
}

/* Podium stage */
#race-game-container .rg-podium-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  padding: 0 16px;
  box-sizing: border-box;
  flex: 1;
  justify-content: flex-end;
}
#race-game-container .rg-podium-wrap {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 6px;
  width: 100%;
  max-width: 320px;
}
#race-game-container .rg-podium-slot {
  display: flex; flex-direction: column; align-items: center;
  gap: 4px; flex: 1;
}

/* Runner figure on podium (canvas-drawn inline) */
#race-game-container .rg-podium-fig {
  width: clamp(46px, 13vw, 60px);
  height: clamp(46px, 13vw, 60px);
}

#race-game-container .rg-podium-medal {
  font-size: clamp(1.5em, 5vw, 1.9em);
  line-height: 1;
  filter: drop-shadow(0 0 8px #ffd70099);
}
#race-game-container .rg-podium-name {
  font-size: clamp(0.58em, 1.9vw, 0.72em);
  font-weight: 700;
  color: #a8c8dd;
  text-align: center; line-height: 1.2;
}
#race-game-container .rg-podium-name.you {
  color: #ffe54c;
  text-shadow: 0 0 10px #ffd70066;
}
#race-game-container .rg-podium-block {
  width: 100%;
  display: flex; align-items: center; justify-content: center;
  border-radius: 10px 10px 0 0;
  font-size: clamp(1.1em, 3.8vw, 1.4em);
  font-weight: 900;
  color: #fff;
  text-shadow: 0 2px 6px #00000066;
  position: relative; overflow: hidden;
}
#race-game-container .rg-podium-block::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 40%;
  background: linear-gradient(180deg, #ffffff22, transparent);
}
#race-game-container .rg-podium-block.p1 {
  height: clamp(88px, 24vw, 118px);
  background: linear-gradient(180deg, #ffe54c, #d4920a);
  box-shadow: 0 -6px 24px #ffd70066, inset 0 1px 0 #fff4;
}
#race-game-container .rg-podium-block.p2 {
  height: clamp(65px, 18vw, 88px);
  background: linear-gradient(180deg, #d8d8d8, #8a8a8a);
  box-shadow: 0 -4px 14px #ffffff33;
}
#race-game-container .rg-podium-block.p3 {
  height: clamp(48px, 13vw, 64px);
  background: linear-gradient(180deg, #e8933a, #8a4e14);
  box-shadow: 0 -4px 10px #cd7f3244;
}

/* Ground under podium */
#race-game-container .rg-podium-ground {
  width: 100%; max-width: 320px;
  height: 14px;
  background: linear-gradient(90deg, #071428, #0e2444, #071428);
  border-top: 2px solid #00d4ff22;
  margin-bottom: 20px;
}

/* Replay button row */
#race-game-container .rg-replay-row {
  padding-bottom: 22px;
}

/* ── Confetti ── */
#race-game-container .rg-conf {
  position: absolute;
  top: -16px;
  border-radius: 3px;
  pointer-events: none;
  animation: rg-conffall linear forwards;
}
@keyframes rg-conffall {
  to { transform: translateY(106vh) rotate(900deg); opacity: 0; }
}

/* ── Star particles on win ── */
#race-game-container .rg-star {
  position: absolute;
  pointer-events: none;
  font-size: 1.1em;
  animation: rg-star-burst ease-out forwards;
}
@keyframes rg-star-burst {
  0%   { opacity: 1; transform: scale(0) translate(0,0); }
  60%  { opacity: 1; }
  100% { opacity: 0; transform: scale(1.4) translate(var(--dx), var(--dy)); }
}

/* ── Hero image panel (start + podium) ── */
#race-game-container .rg-hero-wrap {
  position: relative;
  width: 100%;
  height: clamp(155px, 42vw, 200px);
  overflow: hidden;
  flex-shrink: 0;
}
#race-game-container .rg-hero-img {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center 20%;
  filter: brightness(0.9) saturate(1.15);
}
/* Smoke/fog overlay matching the image atmosphere */
#race-game-container .rg-hero-fog {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 90% 60% at 50% 50%, #00d4ff0a 0%, transparent 70%),
    linear-gradient(180deg,
      #0b1e3a55 0%,
      transparent 30%,
      transparent 65%,
      #0b1e3a 100%
    );
  pointer-events: none;
}
/* Cyan electric glow border at bottom of hero */
#race-game-container .rg-hero-glow {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, transparent, #00d4ff, #00aaff, #00d4ff, transparent);
  box-shadow: 0 0 18px #00d4ffaa, 0 0 6px #00d4ff;
  pointer-events: none;
}
/* Left-side fog particles (pure CSS, matching image smoke) */
#race-game-container .rg-hero-smoke {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 55% 80% at -10% 60%, #0a1e3866 0%, transparent 55%),
    radial-gradient(ellipse 40% 60% at 110% 40%, #071428aa 0%, transparent 50%);
  pointer-events: none;
  animation: rg-smoke-drift 4s ease-in-out infinite alternate;
}
@keyframes rg-smoke-drift {
  from { opacity: 0.7; transform: scaleX(1); }
  to   { opacity: 1;   transform: scaleX(1.04); }
}
/* Podium hero — smaller strip */
#race-game-container .rg-hero-wrap.slim {
  height: clamp(90px, 24vw, 118px);
}
#race-game-container .rg-hero-wrap.slim .rg-hero-img {
  object-position: center 15%;
  filter: brightness(0.7) saturate(1.1) blur(0.5px);
}
/* Gold tint overlay for podium hero */
#race-game-container .rg-hero-wrap.slim .rg-hero-gold {
  position: absolute; inset: 0;
  background:
    linear-gradient(180deg, transparent 30%, #ffd70022 70%, #ffd70044 100%),
    radial-gradient(ellipse 70% 100% at 50% 100%, #ffd70033 0%, transparent 60%);
  pointer-events: none;
}
/* Start screen: brand floats over the top of the hero */
#race-game-container .rg-hero-brand-overlay {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex; flex-direction: column; align-items: center;
  padding-top: 12px;
  pointer-events: none;
  z-index: 2;
}
/* Podium brand strip over slim hero */
#race-game-container .rg-podium-brand-overlay {
  position: absolute;
  bottom: 10px; left: 0; right: 0;
  display: flex; flex-direction: column; align-items: center;
  pointer-events: none;
  z-index: 2;
}

</style>

const container = document.getElementById('race-game-container');
container.innerHTML = '';

const canvas = document.createElement('canvas');

canvas.width = CW; canvas.height = CH;
container.appendChild(canvas);
const ctx = canvas.getContext('2d');

/* ── Pre-bake off-screen canvases for performance ── */
// Runner silhouette cache per color is done at draw time
// Track tile is baked once
const trackTile = document.createElement('canvas');
trackTile.width  = CFG.LANE_W * CFG.NUM_RUNNERS;
trackTile.height = CFG.TILE_H;
const ttx = trackTile.getContext('2d');
bakeTrackTile(ttx, trackTile.width, trackTile.height);

function bakeTrackTile(c, w, h) {
  // Lane base colours alternating
  for (let i = 0; i < CFG.NUM_RUNNERS; i++) {
    c.fillStyle = i % 2 === 0 ? '#c47c46' : '#b87040';
    c.fillRect(i * CFG.LANE_W, 0, CFG.LANE_W, h);
  }
  // Subtle highlight at top of each tile
  const hl = c.createLinearGradient(0,0,0,h*0.15);
  hl.addColorStop(0,'#ffffff18'); hl.addColorStop(1,'transparent');
  c.fillStyle = hl; c.fillRect(0,0,w,h*0.15);

  // Lane line at top of tile
  c.beginPath(); c.moveTo(0,0); c.lineTo(w,0);
  c.strokeStyle = '#ffffff60'; c.lineWidth = 1.5;
  c.setLineDash([10,7]); c.stroke(); c.setLineDash([]);

  // Lane dividers
  for (let i = 1; i < CFG.NUM_RUNNERS; i++) {
    c.beginPath();
    c.moveTo(i*CFG.LANE_W,0); c.lineTo(i*CFG.LANE_W,h);
    c.strokeStyle = '#ffffff55'; c.lineWidth = 1; c.stroke();
  }
}

/* ── Game state ── */
let state   = 'idle';
let runners = [];
let trackOffset   = 0;
let lastTime      = 0;
let rafId         = null;
let finishOrder   = [];

const NUM        = CFG.NUM_RUNNERS;
const PLAYER_IDX = 0;
const TRACK_LEFT = (CW - NUM * CFG.LANE_W) / 2;
const RUNNER_SCREEN_Y = CH * 0.72;

function laneX(idx) { return TRACK_LEFT + idx * CFG.LANE_W + CFG.LANE_W / 2; }

/* ── Init ── */
function initRunners() {
  runners = []; finishOrder = []; trackOffset = 0;
  for (let i = 0; i < NUM; i++) {
    const isP = (i === PLAYER_IDX);
    runners.push({
      idx: i, isPlayer: isP,
      dist: 0,
      speed: isP ? CFG.PLAYER_SPEED
                 : CFG.AI_SPEED_MIN + Math.random() * (CFG.AI_SPEED_MAX - CFG.AI_SPEED_MIN),
      boost: 0, wobble: 0,
      legPhase: Math.random() * Math.PI * 2,
      color: CFG.RUNNER_COLORS[i % CFG.RUNNER_COLORS.length],
      finished: false, rank: 0, screenYOff: 0,
    });
  }
}

/* ── Input ── */
function getXY(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = CW / rect.width, sy = CH / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - rect.left)*sx, y: (src.clientY - rect.top)*sy };
}
function onPointerDown(e) {
  if (state !== 'racing') return;
  e.preventDefault();
  const {x,y} = getXY(e);
  const p   = runners[PLAYER_IDX];
  const px  = laneX(PLAYER_IDX), py = RUNNER_SCREEN_Y + p.screenYOff;
  const dx  = x - px, dy = y - py;
  if (dx*dx + dy*dy < 65*65) {
    p.boost += CFG.TAP_BOOST;
    spawnTapLabel(px, py - 36);
    flashRing(px, py);
  }
}
canvas.addEventListener('mousedown',  onPointerDown, {passive:false});
canvas.addEventListener('touchstart', onPointerDown, {passive:false});

function spawnTapLabel(x, y) {
  const el = mkDiv('rg-tap-label');
  el.textContent = '⚡ BOOST!';
  el.style.cssText = `left:${x/CW*100}%;top:${y/CH*100}%;transform:translate(-50%,-100%);`;
  container.appendChild(el);
  setTimeout(() => el.remove(), 800);
}
function flashRing(px, py) {
  tapRing.style.left = px/CW*100+'%';
  tapRing.style.top  = py/CH*100+'%';
  tapRing.style.display = 'block';
  tapRing.style.animation = 'none';
  void tapRing.offsetWidth;
  tapRing.style.animation = '';
  clearTimeout(tapRing._t);
  tapRing._t = setTimeout(() => tapRing.style.display='none', 750);
}

/* ── Countdown ── */
function beginCountdown() {
  hideStart(); hidePodium();
  initRunners();
  hud.style.display = 'flex';
  state = 'countdown';
  const steps = [{t:'3',c:''},{t:'2',c:''},{t:'1',c:''},{t:'GO!',c:'go'}];
  let i = 0;
  cdOverlay.classList.add('on');
  drawAll();
  function tick() {
    cdText.textContent = steps[i].t;
    cdText.className = 'rg-cd-text ' + steps[i].c;
    cdText.style.animation = 'none'; void cdText.offsetWidth; cdText.style.animation = '';
    i++;
    if (i < steps.length) { setTimeout(tick, 800); }
    else {
      setTimeout(() => {
        cdOverlay.classList.remove('on');
        state = 'racing';
        lastTime = performance.now();
        rafId = requestAnimationFrame(loop);
      }, 650);
    }
  }
  tick();
}

/* ── Loop ── */
function loop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  update(dt);
  drawAll();
  if (state === 'racing') rafId = requestAnimationFrame(loop);
}

/* ── Update ── */
function update(dt) {
  for (let i = 0; i < runners.length; i++) {
    const r = runners[i];
    if (r.finished) continue;
    let spd = r.speed;
    if (r.isPlayer) {
      spd += r.boost;
      r.boost = Math.max(0, r.boost - r.boost * CFG.BOOST_DECAY * dt);
    } else {
      r.wobble += (Math.random() - 0.5) * 0.06;
      r.wobble  = Math.max(-0.2, Math.min(0.2, r.wobble));
      spd      *= (1 + r.wobble);
    }
    r.dist     += spd * dt;
    r.legPhase += (spd / 50) * dt * 8;
    if (r.dist >= CFG.RACE_DISTANCE) {
      r.dist = CFG.RACE_DISTANCE; r.finished = true;
      r.rank = finishOrder.length + 1;
      finishOrder.push(r);
    }
  }

  const player = runners[PLAYER_IDX];
  trackOffset  = player.dist;
  for (let i = 0; i < runners.length; i++) {
    runners[i].screenYOff = (player.dist - runners[i].dist) * 0.4;
  }

  // HUD update
  const metres = Math.round((player.dist / CFG.RACE_DISTANCE) * 100);
  document.getElementById('rg-dist-val').textContent = metres + 'm';
  const pos = getPlayerPosition();
  document.getElementById('rg-pos-val').textContent  = '#' + pos;
  // Boost dots
  const boostPct  = Math.min(1, player.boost / CFG.TAP_BOOST);
  const dots      = Math.round(boostPct * 5);
  const boostEl   = document.getElementById('rg-boost-val');
  if (boostEl) {
    boostEl.textContent = '●'.repeat(dots) + '○'.repeat(5 - dots);
    boostEl.style.color = boostPct > 0.4 ? '#ffe54c' : '#4a8faf';
  }

  const allDone = runners.every(r => r.finished);
  if (player.finished || allDone) {
    const remaining = runners.filter(r => !r.finished).sort((a,b) => b.dist - a.dist);
    remaining.forEach(r => { r.finished=true; r.rank=finishOrder.length+1; finishOrder.push(r); });
    state = 'finished';
    hud.style.display = 'none';
    setTimeout(showPodium, 700);
  }
}

function getPlayerPosition() {
  const p = runners[PLAYER_IDX]; let pos = 1;
  runners.forEach(r => { if (!r.isPlayer && r.dist > p.dist) pos++; });
  return pos;
}

/* ════════════════════════════════════════════════
   DRAWING
════════════════════════════════════════════════ */
function drawAll() {
  ctx.clearRect(0,0,CW,CH);
  drawEnv();
  drawTrack();
  drawFinishLine();
  drawRunners();
  drawTapArrow();
  if (state === 'racing' || state === 'countdown') drawProgressBar();
}

/* ── Environment (sky, stadium, crowd) ── */
function drawEnv() {
  const horizY = CH * 0.28;

  // Sky — rich blue gradient
  const sky = ctx.createLinearGradient(0,0,0,horizY);
  sky.addColorStop(0, '#0e4d8c');
  sky.addColorStop(0.5, '#1a6daf');
  sky.addColorStop(1, '#3a90c8');
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,CW,horizY);

  // Sun / glow
  ctx.save();
  const sunGrad = ctx.createRadialGradient(CW*0.82, CH*0.04, 2, CW*0.82, CH*0.04, 70);
  sunGrad.addColorStop(0, '#fffde0cc');
  sunGrad.addColorStop(0.3, '#ffe06044');
  sunGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = sunGrad;
  ctx.fillRect(0,0,CW,horizY);
  ctx.restore();

  // Clouds
  drawCloud(ctx, 38,  CH*0.04, 0.9, 0.88);
  drawCloud(ctx, 180, CH*0.02, 1.15, 0.92);
  drawCloud(ctx, 320, CH*0.07, 0.78, 0.85);

  // Stadium — lower back section
  const stadH  = CH * 0.14;
  const stadY  = horizY - stadH;
  const stadGr = ctx.createLinearGradient(0, stadY, 0, horizY);
  stadGr.addColorStop(0, '#112a52');
  stadGr.addColorStop(1, '#0d2044');
  ctx.fillStyle = stadGr;
  ctx.fillRect(0, stadY, CW, stadH + 2);

  // Stadium seat rows
  const rowH = stadH / 5;
  for (let r = 0; r < 5; r++) {
    ctx.fillStyle = r % 2 === 0 ? '#0f2548' : '#163462';
    ctx.fillRect(0, stadY + r*rowH, CW, rowH);
  }
  // Arch silhouette hints
  for (let a = 0; a < 7; a++) {
    ctx.beginPath();
    ctx.arc(28 + a * 56, horizY, 18, Math.PI, 0);
    ctx.fillStyle = '#0a1c3a';
    ctx.fill();
  }

  // Crowd dots (colourful, lively)
  for (let d = 0; d < 90; d++) {
    const cx = 4  + (d * 43 + d*d*0.3) % (CW - 8);
    const cy = stadY + 4 + (d * 19 + 3) % (stadH - 8);
    ctx.beginPath();
    ctx.arc(cx, cy, 2.8, 0, Math.PI*2);
    ctx.fillStyle = ['#f9c74f','#f94144','#43aa8b','#277da1','#f3722c','#90be6d','#ff9ff3','#48dbfb'][d%8];
    ctx.fill();
  }

  // Stadium floor stripe
  ctx.fillStyle = '#0a1a38';
  ctx.fillRect(0, horizY - 6, CW, 10);
  ctx.fillStyle = '#00d4ff22';
  ctx.fillRect(0, horizY + 2, CW, 2);

  // Grass sides
  const grassW = TRACK_LEFT + 2;
  const trackBot = CH;

  // Left grass
  const lgGr = ctx.createLinearGradient(0, horizY, grassW, horizY);
  lgGr.addColorStop(0, '#2d8a2d');
  lgGr.addColorStop(1, '#3fa83f');
  ctx.fillStyle = lgGr;
  ctx.fillRect(0, horizY, grassW, trackBot - horizY);

  // Right grass
  const rgGr = ctx.createLinearGradient(CW - grassW, horizY, CW, horizY);
  rgGr.addColorStop(0, '#3fa83f');
  rgGr.addColorStop(1, '#2d8a2d');
  ctx.fillStyle = rgGr;
  ctx.fillRect(CW - grassW, horizY, grassW, trackBot - horizY);

  // Grass edge lines (white border at track edge)
  ctx.strokeStyle = '#ffffffaa';
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(TRACK_LEFT, horizY); ctx.lineTo(TRACK_LEFT, trackBot); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(TRACK_LEFT + NUM*CFG.LANE_W, horizY);
                   ctx.lineTo(TRACK_LEFT + NUM*CFG.LANE_W, trackBot); ctx.stroke();
}

function drawCloud(c, x, y, s, alpha) {
  c.save(); c.globalAlpha = alpha; c.translate(x,y); c.scale(s,s);
  c.fillStyle = '#e8f4ffcc';
  [[0,0,28],[28,6,22],[54,2,25],[24,-14,18],[-20,8,16]].forEach(([cx,cy,r]) => {
    c.beginPath(); c.arc(cx,cy,r,0,Math.PI*2); c.fill();
  });
  c.restore();
}

/* ── Athletics track (scrolling) ── */
function drawTrack() {
  const tl = TRACK_LEFT, tw = NUM * CFG.LANE_W;
  const tileH = CFG.TILE_H;
  const offsetY = trackOffset % tileH;
  const horizY = CH * 0.28;

  // Clip to track rectangle only
  ctx.save();
  ctx.beginPath();
  ctx.rect(tl, horizY, tw, CH - horizY);
  ctx.clip();

  // Perspective gradient — darker near top (distance), lighter near bottom (close)
  const depthGr = ctx.createLinearGradient(0, horizY, 0, CH);
  depthGr.addColorStop(0, '#8a5230aa');
  depthGr.addColorStop(0.3, '#00000000');
  ctx.fillStyle = depthGr;

  // Draw tiled track pattern
  for (let row = -1; row < Math.ceil((CH - horizY) / tileH) + 2; row++) {
    const y = horizY + row * tileH - offsetY;
    ctx.drawImage(trackTile, tl, y);
  }

  // Depth overlay
  ctx.fillStyle = depthGr;
  ctx.fillRect(tl, horizY, tw, CH - horizY);

  // Outer lane boundary lines
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2.5;
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(tl, horizY); ctx.lineTo(tl, CH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(tl+tw, horizY); ctx.lineTo(tl+tw, CH); ctx.stroke();

  // Lane numbers (fixed at bottom of screen)
  ctx.font = 'bold 10px Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffffff55';
  for (let i = 0; i < NUM; i++) {
    ctx.fillText(i+1, tl + i*CFG.LANE_W + CFG.LANE_W/2, CH - 8);
  }

  ctx.restore();
}

/* ── Finish line ── */
function drawFinishLine() {
  const tl = TRACK_LEFT, tw = NUM * CFG.LANE_W;
  const player = runners[PLAYER_IDX];
  const distToFinish = CFG.RACE_DISTANCE - player.dist;
  const fy = RUNNER_SCREEN_Y - distToFinish * 0.4;
  if (fy < CH * 0.28 - 20 || fy > CH + 20) return;

  const sqW = 12, sqH = 10;
  const cols = Math.ceil(tw / sqW);

  ctx.save();
  ctx.beginPath(); ctx.rect(tl, fy - sqH*2, tw, sqH*4); ctx.clip();
  for (let c = 0; c < cols + 1; c++) {
    for (let row = 0; row < 4; row++) {
      ctx.fillStyle = (c + row) % 2 === 0 ? '#fff' : '#111';
      ctx.fillRect(tl + c * sqW - sqW/2, fy - sqH*2 + row*sqH, sqW, sqH);
    }
  }
  ctx.restore();

  // Glow on finish line
  const fGlow = ctx.createLinearGradient(tl, fy, tl+tw, fy);
  fGlow.addColorStop(0, 'transparent');
  fGlow.addColorStop(0.3, '#ffffff33');
  fGlow.addColorStop(0.5, '#ffffff66');
  fGlow.addColorStop(0.7, '#ffffff33');
  fGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = fGlow;
  ctx.fillRect(tl, fy - sqH*2 - 4, tw, sqH*4 + 8);

  // FINISH banner text
  ctx.save();
  ctx.font = 'bold 14px Arial Black, sans-serif';
  ctx.textAlign = 'center';
  ctx.lineWidth = 4; ctx.strokeStyle = '#00000099';
  ctx.strokeText('FINISH', tl + tw/2, fy - sqH*2 - 7);
  ctx.fillStyle = '#fff';
  ctx.fillText('FINISH', tl + tw/2, fy - sqH*2 - 7);
  ctx.restore();
}

/* ── Draw all runners ── */
function drawRunners() {
  const sorted = [...runners].sort((a,b) => b.screenYOff - a.screenYOff);
  sorted.forEach(r => drawRunner(r));
}

function drawRunner(r) {
  const x  = laneX(r.idx);
  const y  = RUNNER_SCREEN_Y + r.screenYOff;
  if (y < CH * 0.26 || y > CH + 90) return;

  const ph = r.legPhase;
  const c  = r.color;
  const sz = 22;

  ctx.save();
  ctx.translate(x, y);

  // ── Cast shadow on track ──
  ctx.save();
  ctx.globalAlpha = 0.22;
  const shGr = ctx.createRadialGradient(4, sz+4, 2, 4, sz+4, sz*1.1);
  shGr.addColorStop(0, '#000');
  shGr.addColorStop(1, 'transparent');
  ctx.fillStyle = shGr;
  ctx.beginPath(); ctx.ellipse(4, sz+4, sz, sz*0.28, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // ── Scale for pseudo-3D depth (runners higher on screen appear smaller) ──
  const depthScale = 0.78 + 0.22 * (y / CH);
  ctx.scale(depthScale, depthScale);

  const swing    = Math.sin(ph) * 15;
  const armSwing = Math.cos(ph) * 13;

  // ── LEGS ──
  ctx.lineCap = 'round';

  // Back thigh + shin
  const backThighX = -sz*0.28, backThighY = sz*0.18;
  const backKneeX  = backThighX - swing*0.22, backKneeY = sz*0.62;
  const backFootX  = backThighX + swing*0.10, backFootY = sz + swing*0.12;

  ctx.lineWidth = 6;
  ctx.strokeStyle = darken(c, 30);
  ctx.beginPath();
  ctx.moveTo(0, sz*0.18);
  ctx.quadraticCurveTo(backKneeX*1.1, backKneeY, backFootX, backFootY);
  ctx.stroke();
  ctx.lineWidth = 5;
  ctx.strokeStyle = c;
  ctx.beginPath();
  ctx.moveTo(0, sz*0.18);
  ctx.quadraticCurveTo(backKneeX, backKneeY, backFootX, backFootY);
  ctx.stroke();

  // Front thigh + shin
  const frtThighX = sz*0.28;
  const frtKneeX  = frtThighX + swing*0.22, frtKneeY = sz*0.62;
  const frtFootX  = frtThighX - swing*0.10, frtFootY = sz - swing*0.12;

  ctx.lineWidth = 6;
  ctx.strokeStyle = darken(c, 30);
  ctx.beginPath();
  ctx.moveTo(0, sz*0.18);
  ctx.quadraticCurveTo(frtKneeX*1.1, frtKneeY, frtFootX, frtFootY);
  ctx.stroke();
  ctx.lineWidth = 5;
  ctx.strokeStyle = c;
  ctx.beginPath();
  ctx.moveTo(0, sz*0.18);
  ctx.quadraticCurveTo(frtKneeX, frtKneeY, frtFootX, frtFootY);
  ctx.stroke();

  // Shoes
  [[backFootX, backFootY], [frtFootX, frtFootY]].forEach(([fx, fy], si) => {
    // Sole
    ctx.beginPath();
    ctx.ellipse(fx+sz*0.08, fy+sz*0.06, sz*0.28, sz*0.11, -0.2, 0, Math.PI*2);
    ctx.fillStyle = '#111';
    ctx.fill();
    // Shoe top
    ctx.beginPath();
    ctx.ellipse(fx, fy, sz*0.18, sz*0.1, 0, 0, Math.PI*2);
    ctx.fillStyle = '#333';
    ctx.fill();
    // Highlight stripe
    ctx.beginPath();
    ctx.ellipse(fx-sz*0.04, fy-sz*0.02, sz*0.09, sz*0.04, -0.3, 0, Math.PI*2);
    ctx.fillStyle = CFG.RUNNER_COLORS[r.idx % CFG.RUNNER_COLORS.length] + 'cc';
    ctx.fill();
  });

  // ── BODY / VEST ──
  // Torso base shape
  ctx.beginPath();
  ctx.moveTo(-sz*0.44, sz*0.24);
  ctx.bezierCurveTo(-sz*0.5, sz*0.0, -sz*0.42, -sz*0.32, 0, -sz*0.32);
  ctx.bezierCurveTo(sz*0.42, -sz*0.32, sz*0.5, sz*0.0, sz*0.44, sz*0.24);
  ctx.closePath();
  ctx.fillStyle = darken(c, 20);
  ctx.fill();

  // Vest front panel
  ctx.beginPath();
  ctx.moveTo(-sz*0.3, sz*0.22);
  ctx.bezierCurveTo(-sz*0.34, sz*0.0, -sz*0.28, -sz*0.26, 0, -sz*0.28);
  ctx.bezierCurveTo(sz*0.28, -sz*0.26, sz*0.34, sz*0.0, sz*0.3, sz*0.22);
  ctx.closePath();
  ctx.fillStyle = c;
  ctx.fill();

  // Vest number badge
  ctx.beginPath();
  ctx.roundRect(-sz*0.2, -sz*0.15, sz*0.4, sz*0.32, 5);
  ctx.fillStyle = r.isPlayer ? '#ffffffee' : lighten(c, 65);
  ctx.fill();
  ctx.font = `bold ${sz*0.28}px Arial Black, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = r.isPlayer ? c : '#333';
  ctx.fillText(r.idx + 1, 0, sz*0.1);

  // Shoulder highlights
  ctx.beginPath();
  ctx.ellipse(-sz*0.36, -sz*0.1, sz*0.14, sz*0.2, -0.4, 0, Math.PI*2);
  ctx.fillStyle = lighten(c, 40)+'66';
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(sz*0.36, -sz*0.1, sz*0.14, sz*0.2, 0.4, 0, Math.PI*2);
  ctx.fillStyle = lighten(c, 40)+'66';
  ctx.fill();

  // ── ARMS ──
  // Back arm
  ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.strokeStyle = darken(c, 25);
  ctx.beginPath();
  ctx.moveTo(-sz*0.38, -sz*0.06);
  ctx.quadraticCurveTo(-sz*0.7, sz*0.06 + armSwing*0.3, -sz*0.58, sz*0.22 + armSwing*0.2);
  ctx.stroke();
  ctx.lineWidth = 4;
  ctx.strokeStyle = c;
  ctx.beginPath();
  ctx.moveTo(-sz*0.38, -sz*0.06);
  ctx.quadraticCurveTo(-sz*0.68, sz*0.05 + armSwing*0.3, -sz*0.56, sz*0.2 + armSwing*0.2);
  ctx.stroke();
  // Hand nub
  ctx.beginPath(); ctx.arc(-sz*0.56, sz*0.2 + armSwing*0.2, sz*0.1, 0, Math.PI*2);
  ctx.fillStyle = '#f5c5a0'; ctx.fill();

  // Front arm
  ctx.lineWidth = 5;
  ctx.strokeStyle = darken(c, 25);
  ctx.beginPath();
  ctx.moveTo(sz*0.38, -sz*0.06);
  ctx.quadraticCurveTo(sz*0.7, sz*0.06 - armSwing*0.3, sz*0.58, sz*0.22 - armSwing*0.2);
  ctx.stroke();
  ctx.lineWidth = 4;
  ctx.strokeStyle = c;
  ctx.beginPath();
  ctx.moveTo(sz*0.38, -sz*0.06);
  ctx.quadraticCurveTo(sz*0.68, sz*0.05 - armSwing*0.3, sz*0.56, sz*0.2 - armSwing*0.2);
  ctx.stroke();
  ctx.beginPath(); ctx.arc(sz*0.56, sz*0.2 - armSwing*0.2, sz*0.1, 0, Math.PI*2);
  ctx.fillStyle = '#f5c5a0'; ctx.fill();

  // ── NECK ──
  ctx.beginPath();
  ctx.moveTo(-sz*0.1, -sz*0.3);
  ctx.lineTo(sz*0.1, -sz*0.3);
  ctx.lineTo(sz*0.08, -sz*0.5);
  ctx.lineTo(-sz*0.08, -sz*0.5);
  ctx.closePath();
  ctx.fillStyle = '#f5c5a0';
  ctx.fill();

  // ── HEAD ──
  // Head shape (slightly oval)
  ctx.beginPath();
  ctx.ellipse(0, -sz*0.7, sz*0.3, sz*0.34, 0, 0, Math.PI*2);
  ctx.fillStyle = '#f5c5a0';
  ctx.fill();
  // Jaw shadow
  ctx.beginPath();
  ctx.ellipse(0, -sz*0.56, sz*0.22, sz*0.14, 0, 0, Math.PI);
  ctx.fillStyle = '#e8a87888';
  ctx.fill();

  // Ear
  ctx.beginPath();
  ctx.ellipse(sz*0.3, -sz*0.7, sz*0.09, sz*0.12, 0.3, 0, Math.PI*2);
  ctx.fillStyle = '#e8b090';
  ctx.fill();

  // Hair
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(0, -sz*0.82, sz*0.3, sz*0.22, 0, Math.PI*1.1, Math.PI*0.0, false);
  ctx.fillStyle = r.isPlayer ? '#222' : ['#3b2008','#0a0a0a','#d4901a','#1a0a00','#4a2808','#cc9944'][r.idx % 6];
  ctx.fill();
  ctx.restore();

  // Eyebrow
  ctx.beginPath();
  ctx.moveTo(sz*0.06, -sz*0.78); ctx.lineTo(sz*0.24, -sz*0.80);
  ctx.strokeStyle = r.isPlayer ? '#222' : '#5a3010';
  ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.stroke();

  // Eye white
  ctx.beginPath();
  ctx.ellipse(sz*0.14, -sz*0.72, sz*0.1, sz*0.08, 0, 0, Math.PI*2);
  ctx.fillStyle = '#fff'; ctx.fill();
  // Iris
  ctx.beginPath();
  ctx.arc(sz*0.16, -sz*0.72, sz*0.055, 0, Math.PI*2);
  ctx.fillStyle = '#222'; ctx.fill();
  // Highlight
  ctx.beginPath();
  ctx.arc(sz*0.18, -sz*0.74, sz*0.02, 0, Math.PI*2);
  ctx.fillStyle = '#fff'; ctx.fill();

  // Smile / expression
  ctx.beginPath();
  ctx.arc(sz*0.06, -sz*0.63, sz*0.08, 0.1, Math.PI - 0.1);
  ctx.strokeStyle = '#c07050'; ctx.lineWidth = 1.5; ctx.stroke();

  // ── PLAYER special FX ──
  if (r.isPlayer) {
    // Animated glow ring
    const ga = 0.3 + 0.25 * Math.sin(Date.now() / 180);
    ctx.beginPath();
    ctx.arc(0, -sz*0.1, sz*1.35, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(255,100,60,${ga})`;
    ctx.lineWidth = 3.5;
    ctx.shadowColor = '#ff4a30'; ctx.shadowBlur = 18;
    ctx.stroke(); ctx.shadowBlur = 0;

    // YOU label
    ctx.font = 'bold 9px Arial Black';
    ctx.textAlign = 'center';
    ctx.lineWidth = 3; ctx.strokeStyle = '#00000099';
    ctx.strokeText('YOU', 0, -sz*1.18);
    ctx.fillStyle = '#fff';
    ctx.fillText('YOU', 0, -sz*1.18);

    // Speed lines when boosted
    if (r.boost > 8) {
      const a = Math.min(0.9, r.boost / 90);
      for (let l = 0; l < 4; l++) {
        const lx = (l - 1.5) * sz * 0.35;
        const lg = ctx.createLinearGradient(lx, sz*0.5, lx, sz*1.8);
        lg.addColorStop(0, `rgba(255,${180+l*20},0,${a * 0.7})`);
        lg.addColorStop(1, 'transparent');
        ctx.beginPath();
        ctx.moveTo(lx - sz*0.06, sz*0.55);
        ctx.lineTo(lx, sz*(1.4 + Math.random()*0.3));
        ctx.lineTo(lx + sz*0.06, sz*0.55);
        ctx.fillStyle = lg;
        ctx.fill();
      }
    }
  }

  ctx.restore();
}

/* ── Tap arrow above player ── */
function drawTapArrow() {
  if (state !== 'racing') return;
  const p  = runners[PLAYER_IDX];
  const x  = laneX(PLAYER_IDX);
  const y  = RUNNER_SCREEN_Y + p.screenYOff - 68;
  const pulse = 0.55 + 0.45 * Math.abs(Math.sin(Date.now() / 260));

  ctx.save();
  ctx.globalAlpha = pulse;
  ctx.translate(x, y);

  // Arrow body
  ctx.beginPath();
  ctx.moveTo(0, 2); ctx.lineTo(-11, -16); ctx.lineTo(11, -16);
  ctx.closePath();
  ctx.fillStyle = '#ffe54c';
  ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 12;
  ctx.fill();

  // Arrow stem
  ctx.beginPath();
  ctx.rect(-4, 2, 8, 10);
  ctx.fillStyle = '#ffe54c';
  ctx.fill();
  ctx.shadowBlur = 0;

  ctx.restore();
}

/* ── Progress bar ── */
function drawProgressBar() {
  const player = runners[PLAYER_IDX];
  const pct    = Math.min(1, player.dist / CFG.RACE_DISTANCE);
  const tl     = TRACK_LEFT, tw = NUM * CFG.LANE_W;
  const by = CH*0.28 + 6, bh = 7;

  // Background
  ctx.fillStyle = '#00000055';
  ctx.beginPath(); ctx.roundRect(tl, by, tw, bh, 4); ctx.fill();

  // Fill
  if (pct > 0) {
    const fg = ctx.createLinearGradient(tl, 0, tl+tw, 0);
    fg.addColorStop(0, '#00d4ff');
    fg.addColorStop(0.6, '#0088ff');
    fg.addColorStop(1, '#ffe54c');
    ctx.fillStyle = fg;
    ctx.beginPath(); ctx.roundRect(tl, by, tw * pct, bh, 4); ctx.fill();

    // Shine
    ctx.fillStyle = '#ffffff44';
    ctx.beginPath(); ctx.roundRect(tl, by, tw * pct, bh*0.45, [4,4,0,0]); ctx.fill();
  }

  // Runner dot on bar
  ctx.beginPath();
  ctx.arc(tl + tw * pct, by + bh/2, 5, 0, Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 8;
  ctx.fill(); ctx.shadowBlur = 0;

  // Flag at end
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('🏁', tl + tw + 2, by + bh + 2);
}

/* ════════════════════════════════════════════════
   PODIUM SCREEN
════════════════════════════════════════════════ */
function showPodium() {
  const player = runners[PLAYER_IDX];
  const others = runners.filter(r => !r.isPlayer);
  shuffle(others);
  const p2 = others[0], p3 = others[1] || others[0];

  document.getElementById('rg-result-title').textContent = 'YOU WIN!';
  document.getElementById('rg-trophy-icon').textContent = '🏆';

  const wrap = document.getElementById('rg-podium-wrap');
  wrap.innerHTML = '';

  const slots = [
    { rank:2, runner:p2,     name:`Runner ${p2.idx+1}`,  cls:'p2', medal:'🥈', you:false },
    { rank:1, runner:player, name:'YOU',                  cls:'p1', medal:'🥇', you:true  },
    { rank:3, runner:p3,     name:`Runner ${p3.idx+1}`,  cls:'p3', medal:'🥉', you:false },
  ];

  slots.forEach(s => {
    const slot = mkDiv('rg-podium-slot');

    // Mini canvas runner figure
    const fig = document.createElement('canvas');
    fig.className = 'rg-podium-fig';
    fig.width = 60; fig.height = 60;
    drawMiniRunner(fig.getContext('2d'), s.runner.color, s.you, 30, 44);
    slot.appendChild(fig);

    const medal = mkDiv('rg-podium-medal');
    medal.textContent = s.medal;
    slot.appendChild(medal);

    const name = mkDiv('rg-podium-name' + (s.you ? ' you' : ''));
    name.textContent = s.name;
    slot.appendChild(name);

    const block = mkDiv('rg-podium-block ' + s.cls);
    block.textContent = '#' + s.rank;
    slot.appendChild(block);

    wrap.appendChild(slot);
  });

  podiumScreen.classList.add('on');
  launchConfetti();
  launchStars();
}

/* Draw a small runner pose on the podium canvas */
function drawMiniRunner(c, color, isPlayer, x, y) {
  c.save(); c.translate(x, y);
  const sz = 11;
  // Arms raised in victory
  c.lineCap = 'round';
  // Left arm up
  c.lineWidth = 3; c.strokeStyle = color;
  c.beginPath(); c.moveTo(-sz*0.35, -sz*0.05); c.lineTo(-sz*0.7, -sz*0.65); c.stroke();
  // Right arm up
  c.beginPath(); c.moveTo(sz*0.35, -sz*0.05); c.lineTo(sz*0.7, -sz*0.65); c.stroke();
  // Legs
  c.beginPath(); c.moveTo(0, sz*0.2); c.lineTo(-sz*0.3, sz*0.9); c.stroke();
  c.beginPath(); c.moveTo(0, sz*0.2); c.lineTo(sz*0.3, sz*0.9); c.stroke();
  // Body
  c.beginPath(); c.ellipse(0, -sz*0.05, sz*0.38, sz*0.3, 0, 0, Math.PI*2);
  c.fillStyle = color; c.fill();
  // Vest
  c.beginPath(); c.ellipse(0, -sz*0.05, sz*0.22, sz*0.2, 0, 0, Math.PI*2);
  c.fillStyle = isPlayer ? '#ffffffee' : lighten(color, 70); c.fill();
  // Head
  c.beginPath(); c.arc(0, -sz*0.62, sz*0.3, 0, Math.PI*2);
  c.fillStyle = '#f5c5a0'; c.fill();
  c.strokeStyle = color; c.lineWidth = 1.5; c.stroke();
  // Hair
  c.beginPath(); c.arc(0, -sz*0.74, sz*0.24, Math.PI*1.05, Math.PI*0.0, false);
  c.fillStyle = isPlayer ? '#222' : '#5a3010'; c.fill();
  // Star above player
  if (isPlayer) {
    c.font = '12px sans-serif'; c.textAlign = 'center';
    c.fillText('⭐', 0, -sz*1.3);
  }
  c.restore();
}

function hidePodium() { podiumScreen.classList.remove('on'); }
function hideStart()  { startScreen.classList.remove('on'); }

/* ── Confetti ── */
function launchConfetti() {
  const shapes = ['rect','circle','ribbon'];
  const cols   = ['#ffd700','#ff3b30','#4a90e2','#4cd964','#ff9500','#fff','#cc44ff','#ff6b9d'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const c   = mkDiv('rg-conf');
      const col = cols[Math.floor(Math.random() * cols.length)];
      const w   = 6 + Math.random() * 8;
      const h   = 8 + Math.random() * 12;
      const dur = 1.4 + Math.random() * 1.6;
      c.style.cssText = `
        left:${Math.random()*100}%;
        width:${w}px; height:${h}px;
        background:${col};
        border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
        animation-duration:${dur}s;
        opacity:${0.7 + Math.random()*0.3};
      `;
      container.appendChild(c);
      setTimeout(() => c.remove(), dur * 1000 + 100);
    }, i * 28);
  }
}

/* ── Star burst from centre ── */
function launchStars() {
  const stars = ['⭐','✨','🌟','💫'];
  for (let i = 0; i < 12; i++) {
    setTimeout(() => {
      const s   = mkDiv('rg-star');
      const ang = (i / 12) * Math.PI * 2;
      const d   = 80 + Math.random() * 80;
      s.textContent = stars[i % stars.length];
      s.style.cssText = `
        left:50%; top:30%;
        --dx:${Math.cos(ang)*d}px;
        --dy:${Math.sin(ang)*d}px;
        animation-duration:${0.8 + Math.random()*0.4}s;
        animation-delay:${i*0.06}s;
      `;
      container.appendChild(s);
      setTimeout(() => s.remove(), 1800);
    }, 200 + i * 40);
  }
}

/* ── Helpers ── */
function mkDiv(cls) {
  const d = document.createElement('div');
  if (cls) cls.trim().split(/\s+/).forEach(c => d.classList.add(c));
  return d;
}
function mkBtn(txt, extraCls) {
  const b = document.createElement('button');
  b.className = 'rg-btn' + (extraCls ? ' '+extraCls : '');
  b.innerHTML = txt; return b;
}
function lighten(hex, amt) {
  const n = parseInt(hex.replace('#',''), 16);
  return `rgb(${Math.min(255,(n>>16)+amt)},${Math.min(255,((n>>8)&0xff)+amt)},${Math.min(255,(n&0xff)+amt)})`;
}
function darken(hex, amt) { return lighten(hex, -amt); }
function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

// Initial frame
drawAll();

})();
